name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Skip when Vercel token is not configured
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: |
          echo "VERCEL_TOKEN secret is not configured yet."
          echo "Create a classic Vercel token, add it as the VERCEL_TOKEN repository secret, then re-run this workflow."

      - name: Pull Vercel project settings
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build with Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npx --yes vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt output to production
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npx --yes vercel@latest deploy --prebuilt --prod --token "$VERCEL_TOKEN"
